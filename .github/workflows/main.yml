name: Build binary

on: [push, pull_request]

env:
  ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install platform
        run:  |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266

      - name: Install dependencies
        run:  |
          arduino-cli lib update-index

      - name: Compile Sketch for ESP8266
        run: cd webserver && arduino-cli compile --output-dir . --fqbn=esp8266:esp8266:d1_mini:xtal=160,vt=flash,ssl=basic,mmu=3216,non32xfer=fast,eesz=4M2M,ip=lm2f,dbg=Disabled,lvl=None____,wipe=none,baud=921600 --verbose webserver.ino

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webserver.bin
          path: webserver.bin
